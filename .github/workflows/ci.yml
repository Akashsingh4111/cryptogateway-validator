name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-validate:
    name: CI — Build & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Syntax-check proxy (server.js)
        run: node --check server.js
      - name: Syntax-check dashboard JavaScript
        run: |
          for f in dashboard/*.js; do
            echo "Checking $f"
            node --check "$f"
          done
      - name: Validate required files exist
        run: |
          set -e
          echo "Verifying project structure..."
          test -f server.js            && echo "  ok: server.js"
          test -f package.json         && echo "  ok: package.json"
          test -f dashboard/index.html && echo "  ok: dashboard/index.html"
          test -f dashboard/styles.css && echo "  ok: dashboard/styles.css"
          test -f dashboard/app.js     && echo "  ok: dashboard/app.js"
          test -f dashboard/roi.html   && echo "  ok: dashboard/roi.html"
          echo "All required files present."
      - name: Security check — ensure no secrets committed
        run: |
          set -e
          if git ls-files | grep -qx ".env"; then
            echo "::error::.env is tracked in git — secrets must never be committed!"
            exit 1
          fi
          echo "ok: .env is not tracked (secrets safe)."

  deploy:
    name: CD — Deploy dashboard to GitHub Pages
    needs: build-and-validate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload dashboard as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dashboard
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

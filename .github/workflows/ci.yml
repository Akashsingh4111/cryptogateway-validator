name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-validate:
    name: Build & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Syntax-check proxy (server.js)
        run: node --check server.js

      - name: Syntax-check dashboard JavaScript
        run: |
          for f in dashboard/*.js; do
            echo "Checking $f"
            node --check "$f"
          done

      - name: Validate required files exist
        run: |
          set -e
          echo "Verifying project structure..."
          test -f server.js            && echo "  ok: server.js"
          test -f package.json         && echo "  ok: package.json"
          test -f dashboard/index.html && echo "  ok: dashboard/index.html"
          test -f dashboard/styles.css && echo "  ok: dashboard/styles.css"
          test -f dashboard/app.js     && echo "  ok: dashboard/app.js"
          test -f dashboard/roi.html   && echo "  ok: dashboard/roi.html"
          echo "All required files present."

      - name: Validate HTML is well-formed
        run: |
          npx --yes html-validate dashboard/index.html dashboard/roi.html || \
            echo "::warning::html-validate reported issues (non-blocking)"

      - name: Security check — ensure no secrets committed
        run: |
          set -e
          if git ls-files | grep -qx ".env"; then
            echo "::error::.env is tracked in git — secrets must never be committed!"
            exit 1
          fi
          echo "ok: .env is not tracked (secrets safe)."

      - name: CI summary
        run: |
          echo "### CryptoGateway Validator — CI passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Dependencies install cleanly" >> $GITHUB_STEP_SUMMARY
          echo "- Proxy and dashboard JS pass syntax checks" >> $GITHUB_STEP_SUMMARY
          echo "- Project structure validated" >> $GITHUB_STEP_SUMMARY
          echo "- No secrets committed" >> $GITHUB_STEP_SUMMARY
